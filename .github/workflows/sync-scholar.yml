name: Sync Google Scholar Papers

on:
  # Run on the 1st of every month at 9:00 UTC
  schedule:
    - cron: "0 9 1 * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync papers from Google Scholar
        id: sync
        env:
          SCHOLAR_ID: ${{ vars.SCHOLAR_ID || 'pDL-0HoAAAAJ' }}
        run: |
          python scripts/sync_scholar.py --scholar-id "$SCHOLAR_ID"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet papers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new papers found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New papers detected!"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update papers from Google Scholar"
          branch: auto/scholar-sync
          delete-branch: true
          title: "Update papers from Google Scholar"
          body: |
            ## Summary
            - Automated sync from Google Scholar profile
            - New papers were detected and added to `papers.json`

            Please review the changes and merge if everything looks correct.
            You can manually add `code`, `arxiv`, or project links before merging.

            ---
            🤖 Generated by the Scholar Sync GitHub Action
